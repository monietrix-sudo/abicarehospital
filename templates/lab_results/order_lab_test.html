{% extends "base/base.html" %}
{% block content %}
<div class="page-header">
  <div class="page-header-left">
    <h1>Order Lab Test</h1>
    <div class="breadcrumb-abi">
      <a href="{% url 'patients:dashboard' %}">Dashboard</a> ›
      <a href="{% url 'lab_results:list' %}">Lab Results</a> › Order
    </div>
  </div>
</div>
<div class="row g-4 justify-content-center">
  <div class="col-lg-8">
    <div class="card-abi mb-4" style="border-left:4px solid var(--accent);">
      <div class="card-body-abi">
        <div style="font-size:12px;color:var(--text-muted);text-transform:uppercase;font-weight:600;">Patient</div>
        <div style="font-size:20px;font-weight:700;">{{ patient.full_name }}</div>
        <div style="font-size:13px;color:var(--text-muted);">{{ patient.hospital_number }} · {{ patient.age }} yrs</div>
      </div>
    </div>
    <div class="card-abi">
      <div class="card-header-abi"><i class="fas fa-flask" style="color:var(--primary);"></i><h2>Select Test</h2></div>
      <div class="card-body-abi">
        <form method="post" class="form-abi">
          {% csrf_token %}
          <div class="row g-3">
            <div class="col-12">
              <label class="form-label">Lab Test Template *</label>
              <select name="template" class="form-select" required>
                <option value="">— Choose test —</option>
                {% regroup templates by category as grouped %}
                {% for group in grouped %}
                <optgroup label="{{ group.grouper|title }}">
                  {% for t in group.list %}
                  <option value="{{ t.id }}">{{ t.name }}</option>
                  {% endfor %}
                </optgroup>
                {% endfor %}
              </select>
            </div>
            <div class="col-md-6">
              <label class="form-label">Result Date</label>
              <input type="date" name="result_date" class="form-control" value="{{ today }}" />
            </div>
            <div class="col-12" style="display:flex;gap:12px;justify-content:flex-end;">
              <a href="{% url 'patient_detail:detail' patient.hospital_number %}" class="btn-abi-outline">Cancel</a>
              <button type="submit" class="btn-abi-primary"><i class="fas fa-flask"></i> Order Test</button>
            </div>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
