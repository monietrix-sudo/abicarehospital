<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Link Expired</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    body{font-family:'DM Sans',sans-serif;background:#F0F4F8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;}
    .card{background:#fff;border-radius:16px;padding:48px;text-align:center;max-width:440px;box-shadow:0 4px 24px rgba(0,0,0,.1);}
    .icon{font-size:64px;margin-bottom:20px;}
    h1{font-size:22px;font-weight:700;color:#2D3748;margin-bottom:10px;}
    p{font-size:14px;color:#718096;line-height:1.6;}
  </style>
</head>
<body>
<div class="card">
  <div class="icon">⏰</div>
  <h1>Link No Longer Valid</h1>
  <p>{{ reason }}</p>
  <p style="margin-top:12px;">Please contact the originating hospital to request a new share link.</p>
</div>
</body>
</html>
